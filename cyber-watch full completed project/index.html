    <script>
        // --- 1. CONFIGURATION & STATE ---
        const CAROUSEL_INTERVAL = 4000;
        const SALE_DURATION_MS = 10 * 60 * 1000; // 10 minutes
        const PRODUCT_DATA_URL = './js/products.json';

        // --- 2. INITIALIZATION (Runs when page loads) ---
        document.addEventListener('DOMContentLoaded', () => {
            initCarousel();
            initSaleTimer();
            fetchProducts();
        });

        // --- 3. CAROUSEL LOGIC ---
        function initCarousel() {
            let carouselIndex = 0;
            const wrapper = document.getElementById('carouselWrapper');
            const dots = document.querySelectorAll('.dot');

            if (!wrapper || dots.length === 0) return;

            setInterval(() => {
                carouselIndex = (carouselIndex + 1) % dots.length;
                wrapper.scrollTo({
                    left: wrapper.offsetWidth * carouselIndex,
                    behavior: 'smooth'
                });
                dots.forEach((dot, i) => dot.classList.toggle('active', i === carouselIndex));
            }, CAROUSEL_INTERVAL);
        }

        // --- 4. PERSISTENT SALE TIMER ---
        function initSaleTimer() {
            const display = document.querySelector('#timer');
            const saleLabel = document.querySelector('.saleLabel');
            const liveDot = document.querySelector('.liveDot');

            if (!display) return;

            let saleEndTime = localStorage.getItem('sale_end_time');

            // Reset timer if it doesn't exist or has already expired
            if (!saleEndTime || Date.now() > saleEndTime) {
                saleEndTime = Date.now() + SALE_DURATION_MS;
                localStorage.setItem('sale_end_time', saleEndTime);
            }

            const timerInterval = setInterval(() => {
                const now = Date.now();
                const distance = saleEndTime - now;

                if (distance <= 0) {
                    clearInterval(timerInterval);
                    display.textContent = "00:00";
                    if (saleLabel) saleLabel.innerHTML = "SALE ENDED";
                    if (liveDot) {
                        liveDot.style.animation = "none";
                        liveDot.style.background = "#888";
                    }
                    return;
                }

                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                display.textContent = `${minutes < 10 ? '0' + minutes : minutes}:${seconds < 10 ? '0' + seconds : seconds}`;
            }, 1000);
        }

        // --- 5. PRODUCT FETCHING & RENDERING ---
        function fetchProducts() {
            const container = document.getElementById("home_page_product");

            // Added cache-buster to ensure fresh data during development
            fetch(`${PRODUCT_DATA_URL}?v=${Date.now()}`)
                .then(res => {
                    if (!res.ok) throw new Error(`Could not find ${PRODUCT_DATA_URL}`);
                    return res.json();
                })
                .then(products => {
                    if (!products || products.length === 0) {
                        container.innerHTML = "<p style='padding:20px; text-align:center;'>No products available.</p>";
                        return;
                    }
                    renderProductGrid(products, container);
                })
                .catch(err => {
                    console.error("Error loading products:", err);
                    container.innerHTML = `<p style='padding:20px; color:red; text-align:center;'>
                    Error: Ensure your JSON file exists at ${PRODUCT_DATA_URL}
                </p>`;
                });
        }

        function renderProductGrid(products, container) {
            container.innerHTML = ""; // Clear loader/previous content

            products.forEach(product => {
                const card = document.createElement("div");
                card.className = "product-card";

                // Calculate a fallback wow price if not provided
                const wowPrice = Math.floor(product.selling_price * 0.95);
                const discountPercent = product.mrp > product.selling_price
                    ? Math.round(((product.mrp - product.selling_price) / product.mrp) * 100)
                    : 0;

                card.innerHTML = `
                <div class="tag-bestseller">BESTSELLER</div>
                <div class="wishlist-heart">♡</div>
                <a href="product-detailsa46c.html?productId=${product.id}" style="text-decoration:none; color:inherit;">
                    <div class="img-container">
                        <img src="${product.img1}" alt="${product.name}" loading="lazy">
                    </div>
                    <div class="product-info">
                        <div class="sponsored-label">Sponsored</div>
                        <div class="product-name">${product.name}</div>
                        
                        <div class="rating-row">
                            <span class="stars">★★★★☆</span>
                            <img src="images/assured.png" class="assured-badge" onerror="this.style.display='none'">
                        </div>

                        <div class="price-row">
                            <span class="price-down-arrow">${discountPercent}% off</span>
                            <span class="mrp">₹${product.mrp}</span>
                            <span class="selling-price">₹${product.selling_price}</span>
                        </div>

                        <div class="wow-offer">
                            <img src="images/wow.jpeg" class="wow-img" alt="WOW" onerror="this.style.display='none'">
                            <span>₹${wowPrice} with offers</span> 
                        </div>

                        <div class="delivery-express">
                            <img src="images/express.jpeg" width="60" onerror="this.style.display='none'">
                            <span>2 day delivery</span>
                        </div>
                    </div>
                </a>
                <div class="add-to-cart-btn" onclick="window.location.href='product-detailsa46c.html?productId=${product.id}'">Add to Cart</div>
            `;
                container.appendChild(card);
            });


            
        }
    </script>
